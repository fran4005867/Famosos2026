<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="5; url=https://jsaerospace.github.io/Famosos2026/" />
  <title>Famosos 2026 — Nos Mudamos</title>
  <meta name="description" content="El Álbum Virtual Famosos 2026 se ha mudado a su nueva dirección oficial." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0118;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      color: white;
    }

    /* Fondo animado */
    .bg-orbs {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.25;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: #7c3aed; top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: #ffd700; bottom: -100px; right: -100px; animation-delay: -4s; }
    .orb-3 { width: 300px; height: 300px; background: #e2001a; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(40px, 30px); }
    }

    /* Tarjeta central */
    .card {
      position: relative; z-index: 10;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 560px;
      width: 92%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.07);
      animation: appear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes appear {
      from { opacity: 0; transform: scale(0.85) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .emoji-icon {
      font-size: 5rem;
      display: block;
      margin-bottom: 20px;
      animation: bounce 1.5s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .card h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 900;
      background: linear-gradient(135deg, #ffd700, #ff9500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .card p {
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .card p strong {
      color: white;
    }

    .go-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #ffd700, #ff9500);
      color: #12051a;
      text-decoration: none;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 16px 36px;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(255, 215, 0, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-bottom: 28px;
    }
    .go-btn:hover {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 14px 40px rgba(255, 215, 0, 0.5);
    }

    .timer-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
    }
    .timer-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255,215,0,0.4);
      color: #ffd700;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      transition: border-color 0.3s;
    }

    /* Progress ring */
    .progress-ring-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .progress-ring-wrapper svg {
      transform: rotate(-90deg);
    }
    .ring-track { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 3; }
    .ring-fill  { fill: none; stroke: #ffd700; stroke-width: 3; stroke-linecap: round;
                  stroke-dasharray: 88; stroke-dashoffset: 88;
                  transition: stroke-dashoffset 0.95s linear; }
    .ring-number {
      position: absolute;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: #ffd700;
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="card">
    <span class="emoji-icon">🏟️</span>
    <h1>¡Nos mudamos!</h1>
    <p>
      El <strong>Álbum Virtual Famosos 2026</strong> ya tiene su hogar oficial.<br>
      Serás redirigido automáticamente a la nueva dirección en unos segundos.
    </p>

    <a class="go-btn" href="https://jsaerospace.github.io/Famosos2026/" id="go-btn">
      <span>🚀</span> Ir ahora
    </a>

    <div class="timer-row">
      <div class="progress-ring-wrapper">
        <svg width="36" height="36" viewBox="0 0 36 36">
          <circle class="ring-track" cx="18" cy="18" r="14"/>
          <circle class="ring-fill" cx="18" cy="18" r="14" id="ring-fill"/>
        </svg>
        <span class="ring-number" id="timer-num">5</span>
      </div>
      <span>Redirigiendo automáticamente…</span>
    </div>
  </div>

  <script>
    const TARGET = 'https://jsaerospace.github.io/Famosos2026/';
    const TOTAL = 5;
    let remaining = TOTAL;

    const numEl  = document.getElementById('timer-num');
    const ringEl = document.getElementById('ring-fill');
    const CIRCUMFERENCE = 2 * Math.PI * 14; // ≈ 87.96

    function updateRing(secs) {
      const ratio = secs / TOTAL;
      ringEl.style.strokeDashoffset = CIRCUMFERENCE * (1 - ratio);
    }

    updateRing(remaining);

    const tick = setInterval(() => {
      remaining--;
      numEl.textContent = remaining;
      updateRing(remaining);
      if (remaining <= 0) {
        clearInterval(tick);
        window.location.href = TARGET;
      }
    }, 1000);
  </script>
</body>
</html>
